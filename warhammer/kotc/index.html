    function Markdown({ text }) {
      // Render *italic* segments
      const parts = text.split(/(\*[^*]+\*)/g);
      return (
        <>
          {parts.map((part, i) => {
            if (part.startsWith("*") && part.endsWith("*")) {
              return <em key={i} className="text-amber-200/90 not-italic font-medium">{part.slice(1, -1)}</em>;
            }
            return <span key={i}>{part}</span>;
          })}
        </>
      );
    }

            <span className="text-[10px] tracking-[0.3em] uppercase text-amber-400/90 font-semibold">
              {action.name} (Action)
            </span>
          </div>

            <div className="grid grid-cols-[60px_1fr] gap-2">
              <div className="text-[10px] tracking-[0.15em] uppercase text-stone-500 font-semibold pt-[3px]">Starts</div>

            <div className="grid grid-cols-[60px_1fr] gap-2">

              <div className="text-stone-200"><Markdown text={action.units}/></div>
            </div>
            <div className="grid grid-cols-[60px_1fr] gap-2">
              <div className="text-[10px] tracking-[0.15em] uppercase text-stone-500 font-semibold pt-[3px]">Completes</div>
              <div className="text-stone-200"><Markdown text={action.completes}/></div>
            </div>
            <div className="grid grid-cols-[60px_1fr] gap-2">
              <div className="text-[10px] tracking-[0.15em] uppercase text-stone-500 font-semibold pt-[3px]">If Done</div>
              <div className="text-stone-200"><Markdown text={action.ifCompleted}/></div>
            </div>
          </div>
        </div>
      );
    }

    function ScoringBlock({ scoring }) {
      return (
        <div className="space-y-3 mt-2">
          {scoring.map((s, i) => (
            <div key={i}>
              <div className="flex items-center gap-2 mb-1.5">
                <div className="h-px flex-grow bg-amber-900/40"></div>
                <div className="text-[10px] tracking-[0.2em] uppercase text-amber-400/80 font-semibold">
                  {s.when}
                </div>
                <div className="h-px flex-grow bg-amber-900/40"></div>
              </div>
              <div className="space-y-2">
                {s.options.map((opt, j) => (
                  <div key={j} className="flex gap-3 items-start">
                    <div className="flex-shrink-0 min-w-[68px] text-right">
                      {opt.vp && (
                        <div className="inline-block px-2 py-0.5 border border-amber-600/60 bg-amber-950/40 font-display text-amber-200 text-xs font-semibold">
                          {opt.vp}
                        </div>
                      )}
                    </div>
                    <div className="flex-1 pt-0.5">
                      {opt.label && (
                        <div className="text-[11px] tracking-wider uppercase text-stone-400 font-semibold mb-0.5">
                          {opt.label}
                        </div>
                      )}
                      <div className="text-[13px] text-stone-200 leading-relaxed">
                        <Markdown text={opt.text}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ============================================================
    // CARDS
    // ============================================================
    function PrimaryCard({ m, expanded, onToggle }) {
      return (
        <div className="border border-amber-900/50 bg-gradient-to-b from-stone-950 to-black hover:border-amber-700/70 transition-colors">
          <button onClick={onToggle} className="w-full text-left p-4 flex items-start gap-3">
            <div className="flex-shrink-0 w-12 h-12 rounded-full bg-gradient-to-br from-amber-700 via-amber-900 to-stone-950 border-2 border-amber-600/80 flex items-center justify-center shadow-lg shadow-amber-950/40">
              <Target size={22} className="text-amber-100" strokeWidth={1.8}/>
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="font-display text-xl text-amber-50 leading-tight">{m.name}</h3>
              <div className="text-[10px] tracking-[0.25em] uppercase text-amber-400/70 mt-0.5">Primary Mission</div>
            </div>
            <div className="flex-shrink-0 mt-1 text-amber-200/40">
              {expanded ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}
            </div>
          </button>

          {expanded && (
            <div className="px-4 pb-4 pt-1 border-t border-amber-900/30">
              <p className="font-quote italic text-stone-400 text-[14px] leading-relaxed mb-3">
                "{m.flavor}"
              </p>
              {m.action && <ActionBlock action={m.action} />}
              <ScoringBlock scoring={m.scoring}/>
            </div>
          )}
        </div>
      );
    }

    function TwistCard({ t, expanded, onToggle }) {
      return (
        <div className="border border-red-900/50 bg-gradient-to-b from-stone-950 to-black hover:border-red-700/70 transition-colors">
          <button onClick={onToggle} className="w-full text-left p-4 flex items-start gap-3">
            <div className="flex-shrink-0 w-12 h-12 bg-gradient-to-br from-red-800 via-red-950 to-stone-950 border-2 border-red-600/70 flex items-center justify-center shadow-lg shadow-red-950/40" style={{clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)'}}>
              <Bolt size={20} className="text-amber-200" strokeWidth={2}/>
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="font-display text-xl text-amber-50 leading-tight">{t.name}</h3>
              <div className="text-[10px] tracking-[0.25em] uppercase text-red-400/80 mt-0.5">Twist</div>
            </div>
            <div className="flex-shrink-0 mt-1 text-red-300/40">
              {expanded ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}
            </div>
          </button>

          {expanded && (
            <div className="px-4 pb-4 pt-1 border-t border-red-900/30">
              <p className="font-quote italic text-stone-400 text-[14px] leading-relaxed mb-3">
                "{t.flavor}"
              </p>
              {t.kotcNote && (
                <div className="mb-3 border-l-2 border-amber-600 bg-amber-950/20 px-3 py-2">
                  <div className="flex items-start gap-2">
                    <Crown size={13} className="text-amber-400 mt-0.5 flex-shrink-0" strokeWidth={2}/>
                    <div className="text-[12px] text-amber-100/90 leading-relaxed">
                      <span className="font-semibold tracking-wider text-[10px] uppercase text-amber-400">KotC: </span>
                      {t.kotcNote}
                    </div>
                  </div>
                </div>
              )}
              <div className="border-l-2 border-red-600/60 pl-3 py-1">
                <div className="text-[10px] tracking-[0.2em] uppercase text-red-400/80 font-semibold mb-1">Effect</div>
                <div className="text-[13.5px] text-stone-200 leading-relaxed">{t.effect}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SecondaryCard({ s, expanded, onToggle }) {
      const hasAction = !!s.action;
      const hasWhenDrawn = !!s.whenDrawn;

      return (
        <div className="border border-stone-700/60 bg-gradient-to-b from-stone-950 to-black hover:border-amber-800/60 transition-colors">
          <button onClick={onToggle} className="w-full text-left p-4 flex items-start gap-3">
            <div className="flex-shrink-0 w-11 h-11 bg-stone-900 border border-stone-700 flex items-center justify-center">
              <Scroll size={18} className="text-stone-400" strokeWidth={1.8}/>
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="font-display text-lg text-stone-100 leading-tight">{s.name}</h3>
              <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                {hasAction && (
                  <span className="text-[9px] uppercase tracking-widest px-1.5 py-0.5 border border-amber-700/60 text-amber-300 font-semibold inline-flex items-center gap-1">
                    <Hourglass size={9} strokeWidth={2.5}/> Action
                  </span>
                )}
                {hasWhenDrawn && (
                  <span className="text-[9px] uppercase tracking-widest px-1.5 py-0.5 border border-yellow-700/50 text-yellow-300/90 font-semibold inline-flex items-center gap-1">
                    <Warning size={9} strokeWidth={2.5}/> When Drawn
                  </span>
                )}
                {s.kotcNote && (
                  <span className="text-[9px] uppercase tracking-widest px-1.5 py-0.5 border border-amber-600/60 bg-amber-950/30 text-amber-200 font-semibold inline-flex items-center gap-1">
                    <Crown size={9} strokeWidth={2.5}/> KotC Note
                  </span>
                )}
              </div>
            </div>
            <div className="flex-shrink-0 mt-1 text-stone-500">
              {expanded ? <ChevronUp size={18}/> : <ChevronDown size={18}/>}
            </div>
          </button>

          {expanded && (
            <div className="px-4 pb-4 pt-1 border-t border-stone-800">
              <p className="font-quote italic text-stone-500 text-[13px] leading-relaxed mb-2">
                "{s.flavor}"
              </p>

              {s.kotcNote && (
                <div className="my-3 border-l-2 border-amber-600 bg-amber-950/20 px-3 py-2">
                  <div className="flex items-start gap-2">
                    <Crown size={13} className="text-amber-400 mt-0.5 flex-shrink-0" strokeWidth={2}/>
                    <div className="text-[12px] text-amber-100/90 leading-relaxed">
                      <span className="font-semibold tracking-wider text-[10px] uppercase text-amber-400">KotC: </span>
                      {s.kotcNote}
                    </div>
                  </div>
                </div>
              )}

              {hasWhenDrawn && (
                <div className="my-3 border-l-2 border-yellow-700/70 bg-yellow-950/15 px-3 py-2">
                  <div className="flex items-start gap-2">
                    <Warning size={13} className="text-yellow-400/90 mt-0.5 flex-shrink-0" strokeWidth={2}/>
                    <div className="text-[12px] text-stone-200 leading-relaxed">
                      <span className="font-semibold tracking-wider text-[10px] uppercase text-yellow-300/90">When Drawn: </span>
                      {s.whenDrawn}
                    </div>
                  </div>
                </div>
              )}

              {hasAction && <ActionBlock action={s.action}/>}

              <ScoringBlock scoring={s.scoring}/>

              {s.designerNote && (
                <div className="mt-3 border border-stone-800 bg-stone-950 px-3 py-2">
                  <div className="flex items-start gap-2">
                    <Info size={12} className="text-stone-500 mt-0.5 flex-shrink-0" strokeWidth={2}/>
                    <div className="text-[11.5px] italic text-stone-400 leading-relaxed">
                      <span className="not-italic font-semibold tracking-wider text-[9px] uppercase text-stone-500">Designer's Note: </span>
                      {s.designerNote}
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // FORMAT INFO PANEL
    // ============================================================
    function FormatRules() {
      const [open, setOpen] = useState(false);
      return (
        <div className="mb-5 border border-amber-900/50 bg-gradient-to-b from-stone-950 to-black">
          <button onClick={() => setOpen(!open)}
            className="w-full px-4 py-3 flex items-center justify-between hover:bg-amber-950/15 transition-colors">
            <div className="flex items-center gap-3">
              <Arch size={20} className="text-amber-400/80" strokeWidth={1.8}/>
              <div className="text-left">
                <div className="font-display text-lg text-amber-50 leading-none">Format Rules</div>
                <div className="text-[10px] tracking-[0.25em] uppercase text-amber-400/60 mt-1">500pt · King of the Colosseum</div>
              </div>
            </div>
            <div className="text-amber-200/40">{open ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}</div>
          </button>

          {open && (
            <div className="px-4 pb-4 pt-1 border-t border-amber-900/30 space-y-4">
              <div>
                <div className="text-[10px] tracking-[0.25em] uppercase text-amber-400/80 font-semibold mb-2">List Building</div>
                <ul className="space-y-1.5 list-none">
                  {FORMAT_RULES.rules.map((r, i) => (
                    <li key={i} className="flex gap-2 text-[13px] text-stone-200 leading-relaxed">
                      <span className="text-amber-500/80 flex-shrink-0">▸</span>
                      <span>{r}</span>
                    </li>
                  ))}
                </ul>
              </div>

              <div>
                <div className="text-[10px] tracking-[0.25em] uppercase text-amber-400/80 font-semibold mb-2">The Arena</div>
                <ul className="space-y-1.5 list-none">
                  {FORMAT_RULES.battlefield.map((r, i) => (
                    <li key={i} className="flex gap-2 text-[13px] text-stone-200 leading-relaxed">
                      <span className="text-amber-500/80 flex-shrink-0">▸</span>
                      <span>{r}</span>
                    </li>
                  ))}
                </ul>
              </div>

              <div>
                <div className="text-[10px] tracking-[0.25em] uppercase text-amber-400/80 font-semibold mb-2">Mission Selection</div>
                <ul className="space-y-1.5 list-none">
                  {FORMAT_RULES.missionSelect.map((r, i) => (
                    <li key={i} className="flex gap-2 text-[13px] text-stone-200 leading-relaxed">
                      <span className="text-amber-500/80 flex-shrink-0">▸</span>
                      <span>{r}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [tab, setTab] = useState("primary"); // primary | twists | secondary
      const [expanded, setExpanded] = useState({});

      const toggle = (key) => setExpanded((e) => ({ ...e, [key]: !e[key] }));

      const tabs = [
        { id: "primary", label: "Primary", count: PRIMARY_MISSIONS.length, Icon: Target },
        { id: "twists", label: "Twists", count: TWISTS.length, Icon: Bolt },
        { id: "secondary", label: "Secondary", count: SECONDARY_MISSIONS.length, Icon: Scroll },
      ];

      return (
        <div className="min-h-screen bg-black text-stone-100 relative">
          <div className="fixed inset-0 pointer-events-none arena-bg" />
          <div className="fixed inset-0 pointer-events-none stone-texture" />

          <div className="relative max-w-3xl mx-auto px-4 py-6">
            {/* ============ HEADER ============ */}
            <header className="text-center mb-6 pb-6 border-b border-amber-900/40">
              <div className="flex items-center justify-center gap-3 mb-3">
                <Laurel size={26} className="text-amber-500/70"/>
                <Crown size={20} className="text-amber-400" strokeWidth={1.8}/>
                <Laurel size={26} flip className="text-amber-500/70"/>
              </div>
              <h1 className="font-display text-3xl sm:text-4xl text-amber-50 leading-tight">
                King of the Colosseum
              </h1>
              <div className="text-[11px] mt-2 text-stone-400 tracking-[0.35em] uppercase">
                Warhammer 40,000 · 500 pts
              </div>
              <div className="mt-3 flex items-center justify-center gap-2 text-stone-500">
                <div className="h-px w-12 bg-amber-900/50"></div>
                <span className="font-quote italic text-stone-400 text-sm">Mission · Twist · Secondary</span>
                <div className="h-px w-12 bg-amber-900/50"></div>
              </div>
            </header>

            {/* ============ FORMAT RULES ============ */}
            <FormatRules/>

            {/* ============ TABS ============ */}
            <div className="mb-5">
              <div className="grid grid-cols-3 gap-1">
                {tabs.map((t) => {
                  const active = tab === t.id;
                  const TabIcon = t.Icon;
                  return (
                    <button key={t.id} onClick={() => setTab(t.id)}
                      className={`relative py-3 px-2 border-2 transition-all ${
                        active
                          ? "bg-gradient-to-b from-amber-950/60 to-black border-amber-600 shadow-lg shadow-amber-950/40"
                          : "bg-stone-950 border-stone-800 hover:border-stone-600"
                      }`}>
                      <div className="flex flex-col items-center gap-1.5">
                        <TabIcon size={20} className={active ? "text-amber-300" : "text-stone-500"} strokeWidth={active ? 2 : 1.5}/>
                        <div className={`font-display text-sm tracking-wider leading-none ${active ? "text-amber-50" : "text-stone-400"}`}>
                          {t.label}
                        </div>
                        <div className={`text-[9px] tracking-widest ${active ? "text-amber-400/80" : "text-stone-600"}`}>
                          {t.count} CARD{t.count !== 1 ? "S" : ""}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* ============ CONTENT ============ */}
            {tab === "primary" && (
              <div className="space-y-2">
                <div className="text-center text-[11px] tracking-[0.25em] uppercase text-stone-500 mb-4">
                  Attacker (or roll-off winner) selects one — unless the opponent selected the Twist
                </div>
                {PRIMARY_MISSIONS.map((m) => (
                  <PrimaryCard key={m.name} m={m}
                    expanded={!!expanded[`p:${m.name}`]}
                    onToggle={() => toggle(`p:${m.name}`)}/>
                ))}
              </div>
            )}

            {tab === "twists" && (
              <div className="space-y-2">
                <div className="text-center text-[11px] tracking-[0.25em] uppercase text-stone-500 mb-4">
                  Defender (or roll-off winner) selects one — unless the opponent selected the Primary
                </div>
                {TWISTS.map((t) => (
                  <TwistCard key={t.name} t={t}
                    expanded={!!expanded[`t:${t.name}`]}
                    onToggle={() => toggle(`t:${t.name}`)}/>
                ))}
              </div>
            )}

            {tab === "secondary" && (
              <div className="space-y-2">
                <div className="text-center text-[11px] tracking-[0.25em] uppercase text-stone-500 mb-4">
                  Tactical Missions only · Draw 2, replenish from deck
                </div>
                {SECONDARY_MISSIONS.map((s) => (
                  <SecondaryCard key={s.name} s={s}
                    expanded={!!expanded[`s:${s.name}`]}
                    onToggle={() => toggle(`s:${s.name}`)}/>
                ))}
              </div>
            )}

            {/* ============ FOOTER ============ */}
            <div className="mt-8 pt-5 border-t border-amber-900/30 text-[11px] text-stone-500 leading-relaxed text-center space-y-1">
              <div className="font-quote italic text-stone-400">"Ave, Imperator. Morituri te salutant."</div>
              <div className="text-stone-600 text-[10px] tracking-widest uppercase mt-2">
                Rules: Chapter Approved 2025-26 · Format: Play On Tabletop
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
